server:
  port: ${SERVER_PORT:3000}

spring:
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fsignal}
    username: ${DB_USER:fareltek}
    password: ${DB_PASS:2580}
    pool:
      initial-size: 2
      max-size: 10

  flyway:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fsignal}
    user: ${DB_USER:fareltek}
    password: ${DB_PASS:2580}
    locations: classpath:db/migration

fsignal:
  archive:
    path: ${ARCHIVE_PATH:./fsignal}
  log:
    path: ${LOG_PATH:./fsignal/logs}
  server:
    ip: ${SERVER_IP:}
  retention:
    days: ${RETENTION_DAYS:730}
  ntp:
    server: ${NTP_SERVER:pool.ntp.org}
    timeout-ms: ${NTP_TIMEOUT_MS:4000}
    warn-threshold-ms: ${NTP_WARN_MS:1000}
  jwt:
    secret: ${JWT_SECRET:ZnNpZ25hbC1kZXYtc2VjcmV0LWtleS1mb3ItbG9jYWwtZGV2ZWxvcG1lbnQtb25seQ==}
    expiry-hours: 8

logging:
  level:
    com.fareltek.fsignal: DEBUG
