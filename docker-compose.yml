services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${SERVER_PORT:-3000}:3000"
    environment:
      SERVER_PORT: "3000"
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-fsignal}
      DB_USER: ${DB_USER:-fareltek}
      DB_PASS: ${DB_PASS:-2580}
      ARCHIVE_PATH: /archive
      TCP_READ_TIMEOUT: ${TCP_READ_TIMEOUT:-300}
    volumes:
      - /archive:/archive
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       ${DB_NAME:-fsignal}
      POSTGRES_USER:     ${DB_USER:-fareltek}
      POSTGRES_PASSWORD: ${DB_PASS:-2580}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fareltek} -d ${DB_NAME:-fsignal}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
