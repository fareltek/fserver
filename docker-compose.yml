services:
  fsignal:
    build: .
    container_name: fsignal-server
    ports:
      - "8080:8080"
      - "5000:5000"
    environment:
      - FSIGNAL_TCP_PORT=5000
      - SERVER_PORT=8080
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
