networks:
  coolify:
    external: true

services:
  fsignal:
    build: .
    ports:
      - "3000:3000"
    environment:
      - SERVER_PORT=3000
      - DB_HOST=c92wzxq4mjni67jdbwte7dem
      - DB_PORT=5432
      - DB_NAME=fsignal
      - DB_USER=fareltek
      - DB_PASS=2580
      - ARCHIVE_PATH=/archive
      - TZ=Europe/Istanbul
      - WAVESHARE_HOST=${WAVESHARE_HOST:-192.168.55.50}
      - WAVESHARE_PORT=${WAVESHARE_PORT:-4001}
      - JWT_SECRET=${JWT_SECRET:-ZnNpZ25hbC1kZXYtc2VjcmV0LWtleS1mb3ItbG9jYWwtZGV2ZWxvcG1lbnQtb25seQ==}
    volumes:
      - fsignal-archive:/archive
    networks:
      - coolify
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  fsignal-archive:
