networks:
  coolify:
    external: true

services:
  fsignal:
    build: .
    ports:
      - "3000:3000"
    environment:
      - SERVER_PORT=3000
      - DB_HOST=c92wzxq4mjni67jdbwte7dem
      - DB_PORT=5432
      - DB_NAME=fsignal
      - DB_USER=fareltek
      - DB_PASS=2580
      - ARCHIVE_PATH=/archive
      - LOG_PATH=/archive/logs
      - RETENTION_DAYS=730
      - NTP_SERVER=pool.ntp.org
      - NTP_TIMEOUT_MS=4000
      - NTP_WARN_MS=1000
      - JWT_SECRET=ZnNpZ25hbC1kZXYtc2VjcmV0LWtleS1mb3ItbG9jYWwtZGV2ZWxvcG1lbnQtb25seQ==
      - TZ=Europe/Istanbul
