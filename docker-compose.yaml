services:
  fsignal:
    build: .
    ports:
      - "3000:3000"
    environment:
      - SERVER_PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=fsignal
      - DB_USER=fsignal
      - DB_PASS=fsignal
      - ARCHIVE_PATH=/archive
      - TZ=Europe/Istanbul
      - WAVESHARE_HOST=${WAVESHARE_HOST:-192.168.55.50}
      - WAVESHARE_PORT=${WAVESHARE_PORT:-4001}
      - JWT_SECRET=${JWT_SECRET:-ZnNpZ25hbC1kZXYtc2VjcmV0LWtleS1mb3ItbG9jYWwtZGV2ZWxvcG1lbnQtb25seQ==}
    volumes:
      - fsignal-archive:/archive
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=fsignal
      - POSTGRES_USER=fsignal
      - POSTGRES_PASSWORD=fsignal
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fsignal"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  pgdata:
  fsignal-archive:
